{{- range $resource := .Values.resources }}
---
apiVersion: {{ $resource.apiVersion }}
kind: {{ $resource.kind }}
metadata:
  name: {{ $resource.metadata.name }}
  {{- if $resource.metadata.namespace }}
  namespace: {{ $resource.metadata.namespace }}
  {{- end }}
  labels:
    {{- if $.Values.globalLabels }}
    {{- toYaml $.Values.globalLabels | nindent 4 }}
    {{- end }}
    {{- if $resource.metadata.labels }}
    {{- toYaml $resource.metadata.labels | nindent 4 }}
    {{- end }}
  {{- if $resource.metadata.annotations }}
  annotations:
    {{- toYaml $resource.metadata.annotations | nindent 4 }}
  {{- end }}
{{- range $key, $val := $resource }}
{{- if not (has $key (list "apiVersion" "kind" "metadata")) }}
{{ $key }}:
  {{- toYaml $val | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}

